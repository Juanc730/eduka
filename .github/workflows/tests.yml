name: Tests Eduka

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # ──────────────────────────────────────────
  # JOB 0: Verificación rápida de sintaxis PHP
  # ──────────────────────────────────────────
  php-syntax-check:
    runs-on: ubuntu-latest

    steps:
      - name: Obtener código
        uses: actions/checkout@v4

      - name: Instalar PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Verificar sintaxis de todos los archivos PHP
        run: |
          echo "Verificando sintaxis PHP..."
          find . -name "*.php" \
            -not -path "./vendor/*" \
            -not -path "./node_modules/*" \
            | while read file; do
                php -l "$file"
                if [ $? -ne 0 ]; then
                  echo "Error de sintaxis en: $file"
                  exit 1
                fi
              done
          echo "Todos los archivos PHP pasaron la verificación de sintaxis."

  # ──────────────────────────────────────────
  # JOB 1: Pruebas Unitarias e Integración (PHPUnit)
  # ──────────────────────────────────────────
  phpunit-tests:
    runs-on: ubuntu-latest
    needs: php-syntax-check

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ''
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
          MYSQL_DATABASE: eduka_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=5

    steps:
      - name: Obtener código
        uses: actions/checkout@v4

      - name: Instalar PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo_mysql

      - name: Instalar dependencias de Composer
        run: composer install --no-interaction --prefer-dist

      - name: Crear archivo de configuración de base de datos de prueba
        run: |
          cat > backend/config/database_test.php << 'EOF'
          <?php
          $host     = '127.0.0.1';
          $dbname   = 'eduka_test';
          $username = 'root';
          $password = '';
          try {
              $pdo = new PDO("mysql:host=$host;dbname=$dbname;charset=utf8mb4", $username, $password);
              $pdo->setAttribute(PDO::ATTR_ERRMODE, PDO::ERRMODE_EXCEPTION);
              $pdo->setAttribute(PDO::ATTR_DEFAULT_FETCH_MODE, PDO::FETCH_ASSOC);
          } catch (PDOException $e) {
              die("Error de conexión a BD de pruebas: " . $e->getMessage());
          }
          ?>
          EOF

      - name: Esperar a que MySQL esté listo
        run: |
          until mysqladmin ping -h 127.0.0.1 --silent; do
            sleep 1
          done

      - name: Crear esquema de base de datos de prueba
        run: |
          mysql -h 127.0.0.1 -u root eduka_test -e "
          CREATE TABLE roles (
              id INT AUTO_INCREMENT PRIMARY KEY,
              nombre VARCHAR(50) NOT NULL
          );
          CREATE TABLE usuarios (
              id INT AUTO_INCREMENT PRIMARY KEY,
              nombre VARCHAR(100) NOT NULL,
              apellido VARCHAR(100) NOT NULL,
              email VARCHAR(150) NOT NULL UNIQUE,
              password VARCHAR(255) NOT NULL,
              rol_id INT NOT NULL,
              activo TINYINT(1) DEFAULT 1,
              created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
              FOREIGN KEY (rol_id) REFERENCES roles(id)
          );
          CREATE TABLE login_intentos (
              id INT AUTO_INCREMENT PRIMARY KEY,
              email VARCHAR(150) NOT NULL,
              ip VARCHAR(45) NOT NULL,
              fecha TIMESTAMP DEFAULT CURRENT_TIMESTAMP
          );
          INSERT INTO roles (nombre) VALUES ('administrador'), ('estudiante'), ('docente');
          "

      - name: Ejecutar pruebas unitarias
        run: vendor/bin/phpunit --testsuite Unit

      - name: Ejecutar pruebas de integración
        run: vendor/bin/phpunit --testsuite Integration

  # ──────────────────────────────────────────
  # JOB 2: Pruebas Funcionales (Cypress)
  # ──────────────────────────────────────────
  cypress-tests:
    runs-on: ubuntu-latest
    needs: phpunit-tests

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ''
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
          MYSQL_DATABASE: eduka_db
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=5

    steps:
      - name: Obtener código
        uses: actions/checkout@v4

      - name: Instalar PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo_mysql

      - name: Crear archivo de configuración de base de datos real
        run: |
          cat > backend/config/database.php << 'EOF'
          <?php
          $host     = '127.0.0.1';
          $dbname   = 'eduka_db';
          $username = 'root';
          $password = '';
          try {
              $pdo = new PDO("mysql:host=$host;dbname=$dbname;charset=utf8mb4", $username, $password);
              $pdo->setAttribute(PDO::ATTR_ERRMODE, PDO::ERRMODE_EXCEPTION);
              $pdo->setAttribute(PDO::ATTR_DEFAULT_FETCH_MODE, PDO::FETCH_ASSOC);
          } catch (PDOException $e) {
              header('Content-Type: application/json');
              http_response_code(500);
              echo json_encode(['error' => 'Error de conexión a la base de datos']);
              exit;
          }
          ?>
          EOF

      - name: Esperar a que MySQL esté listo
        run: |
          until mysqladmin ping -h 127.0.0.1 --silent; do
            sleep 1
          done

      - name: Crear esquema y datos de prueba
        run: |
          mysql -h 127.0.0.1 -u root eduka_db -e "
          CREATE TABLE roles (id INT AUTO_INCREMENT PRIMARY KEY, nombre VARCHAR(50) NOT NULL);
          CREATE TABLE usuarios (
              id INT AUTO_INCREMENT PRIMARY KEY,
              nombre VARCHAR(100) NOT NULL,
              apellido VARCHAR(100) NOT NULL,
              email VARCHAR(150) NOT NULL UNIQUE,
              password VARCHAR(255) NOT NULL,
              rol_id INT NOT NULL,
              activo TINYINT(1) DEFAULT 1,
              created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
              FOREIGN KEY (rol_id) REFERENCES roles(id)
          );
          CREATE TABLE login_intentos (
              id INT AUTO_INCREMENT PRIMARY KEY,
              email VARCHAR(150) NOT NULL,
              ip VARCHAR(45) NOT NULL,
              fecha TIMESTAMP DEFAULT CURRENT_TIMESTAMP
          );
          INSERT INTO roles (nombre) VALUES ('administrador'), ('estudiante'), ('docente');
          "

      - name: Generar e insertar usuario admin con hash válido para PHP 8.2
        run: |
          HASH=$(php -r "echo password_hash('password123', PASSWORD_DEFAULT);")
          mysql -h 127.0.0.1 -u root eduka_db -e "
          INSERT INTO usuarios (nombre, apellido, email, password, rol_id) VALUES
          ('Admin', 'Eduka', 'admin@eduka.com', '$HASH', 1);
          "

      - name: Iniciar servidor PHP
        run: |
          php -S 0.0.0.0:8000 -t . > php-server.log 2>&1 &
          sleep 3
          curl -sf http://localhost:8000/frontend/pages/login.html || (cat php-server.log && exit 1)

      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Instalar dependencias de Node
        run: npm install

      - name: Ejecutar pruebas de Cypress
        uses: cypress-io/github-action@v6
        with:
          working-directory: .
          command: npx cypress run --project tests
        env:
          CYPRESS_BASE_URL: http://localhost:8000

      - name: Subir capturas de pantalla si fallan las pruebas
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: tests/cypress/screenshots