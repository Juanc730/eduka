name: Verificación de sintaxis PHP

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  php-syntax-check:
    runs-on: ubuntu-latest

    steps:
      - name: Obtener código
        uses: actions/checkout@v4

      - name: Instalar PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Verificar sintaxis de todos los archivos PHP
        run: |
          echo "Verificando sintaxis PHP..."
          find . -name "*.php" \
            -not -path "./vendor/*" \
            | while read file; do
                php -l "$file"
                if [ $? -ne 0 ]; then
                  echo "Error de sintaxis en: $file"
                  exit 1
                fi
              done
          echo "Todos los archivos PHP pasaron la verificación de sintaxis."