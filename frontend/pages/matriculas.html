<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Matrículas — Instituto Eduka</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

<nav class="navbar">
    <div class="navbar-brand">Instituto Eduka</div>
    <div class="navbar-links">
        <span id="nombre-usuario"></span>
        <a href="dashboard.html">Inicio</a>
        <a href="#" id="btn-logout">Cerrar sesión</a>
    </div>
</nav>

<div class="dashboard-container">
    <div class="page-header">
        <h1>Gestión de Matrículas</h1>
    </div>

    <p class="success" id="mensaje-success" style="display:none;"></p>
    <p class="error" id="mensaje-error" style="display:none;"></p>

    <form id="form-filtros" class="form-card" style="margin-bottom:1.5rem; display:flex; gap:1rem; flex-wrap:wrap; align-items:flex-end;">
        <div style="flex:2; min-width:200px;">
            <label>Buscar</label>
            <input type="text" id="buscar" placeholder="🔍 Estudiante, correo o curso...">
        </div>
        <div style="flex:1; min-width:150px;">
            <label>Estado</label>
            <select id="filtro-estado">
                <option value="">Todos</option>
                <option value="pendiente">Pendiente</option>
                <option value="confirmada">Confirmada</option>
                <option value="anulada">Anulada</option>
            </select>
        </div>
        <div>
            <button type="submit" class="btn-primary">Filtrar</button>
            <button type="button" id="btn-limpiar" class="btn-secondary">Limpiar</button>
        </div>
    </form>

    <div class="reporte-resumen" id="resumen" style="margin-bottom:1.5rem;"></div>

    <div class="table-container">
        <table class="tabla">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Estudiante</th>
                    <th>Correo</th>
                    <th>Curso</th>
                    <th>Estado</th>
                    <th>Fecha</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="tabla-matriculas">
                <tr><td colspan="7" style="text-align:center; color:#666;">Cargando...</td></tr>
            </tbody>
        </table>
    </div>

    <div class="paginacion" id="paginacion"></div>
    <p class="pag-info" id="pag-info"></p>
</div>

<script src="../assets/js/api.js"></script>
<script>
if (!estaAutenticado()) {
    window.location.href = 'login.html';
}

let paginaActual = 1;
let buscarActual = '';
let estadoActual = '';

async function cargarUsuario() {
    const { data } = await apiGet('/auth/me.php');
    if (!data.success || data.data.rol !== 'administrador') {
        window.location.href = 'dashboard.html';
        return;
    }
    document.getElementById('nombre-usuario').textContent = `Hola, ${data.data.nombre}`;
}

async function cargarMatriculas() {
    const tabla = document.getElementById('tabla-matriculas');
    tabla.innerHTML = '<tr><td colspan="7" style="text-align:center; color:#666;">Cargando...</td></tr>';

    const params = new URLSearchParams({ pagina: paginaActual });
    if (buscarActual) params.set('buscar', buscarActual);
    if (estadoActual) params.set('estado', estadoActual);

    const { data } = await apiGet(`/matriculas/listar.php?${params.toString()}`);

    if (!data.success) {
        tabla.innerHTML = '<tr><td colspan="7" style="text-align:center; color:#e74c3c;">Error al cargar matrículas.</td></tr>';
        return;
    }

    const { matriculas, total, pagina, total_pags } = data.data;

    document.getElementById('resumen').innerHTML = `
        <div class="resumen-card">
            <span class="resumen-num">${total}</span>
            <span class="resumen-label">Total mostradas</span>
        </div>
        <div class="resumen-card">
            <span class="resumen-num">${matriculas.filter(m => m.estado === 'confirmada').length}</span>
            <span class="resumen-label">Confirmadas (esta página)</span>
        </div>
        <div class="resumen-card">
            <span class="resumen-num">${matriculas.filter(m => m.estado === 'pendiente').length}</span>
            <span class="resumen-label">Pendientes (esta página)</span>
        </div>
    `;

    if (matriculas.length === 0) {
        tabla.innerHTML = '<tr><td colspan="7" style="text-align:center; color:#666;">No hay matrículas que coincidan.</td></tr>';
    } else {
        tabla.innerHTML = matriculas.map(m => `
            <tr>
                <td>${m.id}</td>
                <td>${escapeHtml(m.estudiante)}</td>
                <td>${escapeHtml(m.email)}</td>
                <td>${escapeHtml(m.curso)}</td>
                <td><span class="estado-badge estado-${m.estado}">${capitalize(m.estado)}</span></td>
                <td>${new Date(m.fecha).toLocaleString('es-PE', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' })}</td>
                <td>
                    ${m.estado !== 'anulada'
                        ? `<button class="btn-danger btn-anular" data-id="${m.id}">Anular</button>`
                        : '<span style="color:#aaa;">—</span>'}
                </td>
            </tr>
        `).join('');

        document.querySelectorAll('.btn-anular').forEach(btn => {
            btn.addEventListener('click', () => anularMatricula(btn.dataset.id));
        });
    }

    renderizarPaginacion(pagina, total_pags);
    document.getElementById('pag-info').textContent = total_pags > 0
        ? `Mostrando ${matriculas.length} de ${total} matrículas — Página ${pagina} de ${total_pags}`
        : '';
}

function renderizarPaginacion(pagina, totalPags) {
    const cont = document.getElementById('paginacion');
    if (totalPags <= 1) { cont.innerHTML = ''; return; }

    let html = '';
    if (pagina > 1) html += `<button class="pag-btn" data-pag="${pagina - 1}">← Anterior</button>`;
    for (let i = 1; i <= totalPags; i++) {
        html += `<button class="pag-btn ${i === pagina ? 'pag-activa' : ''}" data-pag="${i}">${i}</button>`;
    }
    if (pagina < totalPags) html += `<button class="pag-btn" data-pag="${pagina + 1}">Siguiente →</button>`;

    cont.innerHTML = html;
    cont.querySelectorAll('.pag-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            paginaActual = parseInt(btn.dataset.pag);
            cargarMatriculas();
        });
    });
}

async function anularMatricula(id) {
    if (!confirm('¿Anular esta matrícula? Se devolverá el cupo al curso.')) return;

    const { data } = await apiPut('/matriculas/anular.php', { id: parseInt(id) });

    if (data.success) {
        mostrarMensaje('success', data.message);
        cargarMatriculas();
    } else {
        mostrarMensaje('error', data.error);
    }
}

document.getElementById('form-filtros').addEventListener('submit', function (e) {
    e.preventDefault();
    buscarActual = document.getElementById('buscar').value.trim();
    estadoActual = document.getElementById('filtro-estado').value;
    paginaActual = 1;
    cargarMatriculas();
});

document.getElementById('btn-limpiar').addEventListener('click', function () {
    document.getElementById('buscar').value = '';
    document.getElementById('filtro-estado').value = '';
    buscarActual = '';
    estadoActual = '';
    paginaActual = 1;
    cargarMatriculas();
});

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function capitalize(text) {
    return text.charAt(0).toUpperCase() + text.slice(1);
}

function mostrarMensaje(tipo, texto) {
    const el = document.getElementById(`mensaje-${tipo}`);
    el.textContent = texto;
    el.style.display = 'block';
    setTimeout(() => { el.style.display = 'none'; }, 4000);
}

document.getElementById('btn-logout').addEventListener('click', function (e) {
    e.preventDefault();
    if (confirm('¿Estás seguro que deseas cerrar sesión?')) {
        eliminarToken();
        localStorage.removeItem('eduka_usuario');
        window.location.href = 'login.html';
    }
});

cargarUsuario();
cargarMatriculas();
</script>

</body>
</html>
