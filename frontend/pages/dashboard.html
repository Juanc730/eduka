<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — Instituto Eduka</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

<nav class="navbar">
    <div class="navbar-brand">Instituto Eduka</div>
    <div class="navbar-links">
        <span id="nombre-usuario"></span>
        <a href="#" id="btn-logout">Cerrar sesión</a>
    </div>
</nav>

<div class="dashboard-container">
    <div class="bienvenida-header">
        <div>
            <h1 id="titulo-bienvenida"></h1>
            <p class="fecha-hoy" id="fecha-hoy"></p>
        </div>
        <p class="rol-badge" id="badge-rol"></p>
    </div>

    <div class="cards-grid" id="cards-grid">
        <!-- Las tarjetas se llenarán según el rol -->
    </div>
</div>

<script src="../assets/js/api.js"></script>
<script>
if (!estaAutenticado()) {
    window.location.href = 'login.html';
}

async function inicializar() {
    const { status, data } = await apiGet('/auth/me.php');

    if (!data.success) {
        eliminarToken();
        window.location.href = 'login.html';
        return;
    }

    const usuario = data.data;

    document.getElementById('nombre-usuario').textContent = `Hola, ${usuario.nombre}`;
    document.getElementById('titulo-bienvenida').textContent = `Bienvenido, ${usuario.nombre} 👋`;

    const badge = document.getElementById('badge-rol');
    badge.textContent = usuario.rol.charAt(0).toUpperCase() + usuario.rol.slice(1);
    badge.classList.add(`rol-${usuario.rol}`);

    const dias  = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
    const meses = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
    const hoy   = new Date();
    document.getElementById('fecha-hoy').textContent =
        `📅 ${dias[hoy.getDay()]}, ${hoy.getDate()} de ${meses[hoy.getMonth()]} de ${hoy.getFullYear()}`;

    // Por ahora solo un mensaje de placeholder, los módulos siguientes llenarán esto
    document.getElementById('cards-grid').innerHTML = `
        <div class="card">
            <div class="card-icon">🚧</div>
            <h3>Más módulos próximamente</h3>
            <p>Seguimos migrando el resto del sistema a la nueva arquitectura.</p>
        </div>
    `;
}

document.getElementById('btn-logout').addEventListener('click', function (e) {
    e.preventDefault();
    if (confirm('¿Estás seguro que deseas cerrar sesión?')) {
        eliminarToken();
        localStorage.removeItem('eduka_usuario');
        window.location.href = 'login.html';
    }
});

inicializar();
</script>

</body>
</html>
