<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cursos — Instituto Eduka</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

<nav class="navbar">
    <div class="navbar-brand">Instituto Eduka</div>
    <div class="navbar-links">
        <span id="nombre-usuario"></span>
        <a href="dashboard.html">Inicio</a>
        <a href="#" id="btn-logout">Cerrar sesión</a>
    </div>
</nav>

<div class="dashboard-container">
    <div class="page-header">
        <h1>Cursos</h1>
        <button class="btn-primary" id="btn-nuevo" style="display:none;">+ Nuevo Curso</button>
    </div>

    <p class="success" id="mensaje-success" style="display:none;"></p>
    <p class="error" id="mensaje-error" style="display:none;"></p>

    <div class="cards-grid" id="cards-cursos">
        <p style="color:#666;">Cargando cursos...</p>
    </div>
</div>

<!-- Modal de Crear/Editar Curso -->
<div id="modal-curso" class="modal-overlay" style="display:none;">
    <div class="modal-card">
        <h2 id="modal-titulo">Nuevo Curso</h2>
        <p class="error" id="modal-error" style="display:none;"></p>

        <form id="form-curso">
            <input type="hidden" id="curso-id">

            <label>Nombre del curso *</label>
            <input type="text" id="curso-nombre" required>

            <label>Descripción</label>
            <textarea id="curso-descripcion" rows="3" style="width:100%; padding:0.6rem 0.8rem; border:1px solid #ccc; border-radius:6px; font-family:inherit; font-size:1rem;"></textarea>

            <label>Docente</label>
            <select id="curso-docente">
                <option value="">-- Sin asignar --</option>
            </select>

            <label>Cupos totales *</label>
            <input type="number" id="curso-cupos" min="1" required>

            <label>Horario *</label>
            <input type="text" id="curso-horario" placeholder="Ej: Lunes y Miércoles 7:00pm - 9:00pm" required>

            <div style="display:flex; gap:0.8rem; margin-top:1.2rem;">
                <button type="submit" class="btn-primary" style="flex:1;">Guardar</button>
                <button type="button" class="btn-secondary" id="btn-cancelar" style="flex:1;">Cancelar</button>
            </div>
        </form>
    </div>
</div>

<script src="../assets/js/api.js"></script>
<script>
if (!estaAutenticado()) {
    window.location.href = 'login.html';
}

let rolActual = '';
let cursosCache = [];

async function cargarUsuario() {
    const { data } = await apiGet('/auth/me.php');
    if (!data.success) {
        window.location.href = 'login.html';
        return;
    }
    rolActual = data.data.rol;
    document.getElementById('nombre-usuario').textContent = `Hola, ${data.data.nombre}`;

    if (rolActual === 'administrador') {
        document.getElementById('btn-nuevo').style.display = 'inline-block';
        cargarDocentes();
    }
}

async function cargarDocentes() {
    const { data } = await apiGet('/cursos/docentes.php');
    if (data.success) {
        const select = document.getElementById('curso-docente');
        data.data.docentes.forEach(d => {
            const opt = document.createElement('option');
            opt.value = d.id;
            opt.textContent = `${d.nombre} ${d.apellido}`;
            select.appendChild(opt);
        });
    }
}

async function cargarCursos() {
    const cont = document.getElementById('cards-cursos');
    cont.innerHTML = '<p style="color:#666;">Cargando cursos...</p>';

    const { data } = await apiGet('/cursos/listar.php');

    if (!data.success) {
        cont.innerHTML = '<p style="color:#e74c3c;">Error al cargar los cursos.</p>';
        return;
    }

    cursosCache = data.data.cursos;

    if (cursosCache.length === 0) {
        cont.innerHTML = '<p style="color:#666;">No hay cursos disponibles por el momento.</p>';
        return;
    }

    cont.innerHTML = cursosCache.map(c => {
        const docente = c.docente_nombre ? `${c.docente_nombre} ${c.docente_apellido}` : 'Sin asignar';
        const cupoInfo = renderizarCupo(c.cupos_disponibles, c.cupos_totales);

        let acciones = '';
        if (rolActual === 'administrador') {
            acciones = `
                <div class="btn-group">
                    <button class="btn-secondary btn-editar" data-id="${c.id}">Editar</button>
                    <button class="btn-danger btn-eliminar" data-id="${c.id}">Eliminar</button>
                </div>
            `;
        } else if (rolActual === 'estudiante') {
            acciones = c.cupos_disponibles > 0
                ? `<button class="btn-primary" disabled title="Disponible cuando el módulo de matrículas esté listo">Matricularme</button>`
                : `<button class="btn-secondary" disabled>Sin cupos</button>`;
        }

        return `
            <div class="card curso-card">
                <h3>${escapeHtml(c.nombre)}</h3>
                <p class="curso-desc">${escapeHtml(c.descripcion || 'Sin descripción.')}</p>
                <div class="curso-info">
                    <span>👨‍🏫 ${escapeHtml(docente)}</span>
                    <span>🕐 ${escapeHtml(c.horario)}</span>
                </div>
                ${cupoInfo}
                ${acciones}
            </div>
        `;
    }).join('');

    document.querySelectorAll('.btn-editar').forEach(btn => {
        btn.addEventListener('click', () => abrirModalEditar(btn.dataset.id));
    });
    document.querySelectorAll('.btn-eliminar').forEach(btn => {
        btn.addEventListener('click', () => eliminarCurso(btn.dataset.id));
    });
}

function renderizarCupo(disponibles, totales) {
    const porcentaje = totales > 0 ? (disponibles / totales) * 100 : 0;
    let clase, icono, texto;

    if (disponibles == 0) {
        clase = 'cupos-agotado'; icono = '🔴'; texto = 'Sin cupos disponibles';
    } else if (porcentaje <= 25) {
        clase = 'cupos-critico'; icono = '🟠'; texto = `¡Solo ${disponibles} cupo(s) disponible(s)!`;
    } else if (porcentaje <= 50) {
        clase = 'cupos-medio'; icono = '🟡'; texto = `${disponibles} / ${totales} cupos`;
    } else {
        clase = 'cupos-ok'; icono = '🟢'; texto = `${disponibles} / ${totales} cupos`;
    }

    return `
        <div class="cupo-indicador ${clase}">
            <span>${icono} ${texto}</span>
            <div class="cupo-barra-container">
                <div class="cupo-barra-fill" style="width:${porcentaje}%"></div>
            </div>
        </div>
    `;
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// Modal
const modal = document.getElementById('modal-curso');
const formCurso = document.getElementById('form-curso');

document.getElementById('btn-nuevo').addEventListener('click', abrirModalCrear);
document.getElementById('btn-cancelar').addEventListener('click', () => modal.style.display = 'none');

function abrirModalCrear() {
    document.getElementById('modal-titulo').textContent = 'Nuevo Curso';
    document.getElementById('curso-id').value = '';
    formCurso.reset();
    document.getElementById('modal-error').style.display = 'none';
    modal.style.display = 'flex';
}

function abrirModalEditar(id) {
    const c = cursosCache.find(x => x.id == id);
    if (!c) return;

    document.getElementById('modal-titulo').textContent = 'Editar Curso';
    document.getElementById('curso-id').value = c.id;
    document.getElementById('curso-nombre').value = c.nombre;
    document.getElementById('curso-descripcion').value = c.descripcion || '';
    document.getElementById('curso-docente').value = c.docente_id || '';
    document.getElementById('curso-cupos').value = c.cupos_totales;
    document.getElementById('curso-horario').value = c.horario;
    document.getElementById('modal-error').style.display = 'none';
    modal.style.display = 'flex';
}

formCurso.addEventListener('submit', async function (e) {
    e.preventDefault();

    const id = document.getElementById('curso-id').value;
    const modalError = document.getElementById('modal-error');
    modalError.style.display = 'none';

    const payload = {
        nombre: document.getElementById('curso-nombre').value.trim(),
        descripcion: document.getElementById('curso-descripcion').value.trim(),
        docente_id: document.getElementById('curso-docente').value || null,
        cupos_totales: parseInt(document.getElementById('curso-cupos').value),
        horario: document.getElementById('curso-horario').value.trim()
    };

    let resultado;
    if (id) {
        payload.id = parseInt(id);
        resultado = await apiPut('/cursos/editar.php', payload);
    } else {
        resultado = await apiPost('/cursos/crear.php', payload);
    }

    if (resultado.data.success) {
        modal.style.display = 'none';
        mostrarMensaje('success', resultado.data.message);
        cargarCursos();
    } else {
        modalError.scrollIntoView();
        modalError.textContent = resultado.data.error;
        modalError.style.display = 'block';
    }
});

async function eliminarCurso(id) {
    if (!confirm('¿Eliminar este curso? Esta acción no se puede deshacer.')) return;

    const { data } = await apiPut('/cursos/eliminar.php', { id: parseInt(id) });

    if (data.success) {
        mostrarMensaje('success', data.message);
        cargarCursos();
    } else {
        mostrarMensaje('error', data.error);
    }
}

function mostrarMensaje(tipo, texto) {
    const el = document.getElementById(`mensaje-${tipo}`);
    el.textContent = texto;
    el.style.display = 'block';
    setTimeout(() => { el.style.display = 'none'; }, 4000);
}

document.getElementById('btn-logout').addEventListener('click', function (e) {
    e.preventDefault();
    if (confirm('¿Estás seguro que deseas cerrar sesión?')) {
        eliminarToken();
        localStorage.removeItem('eduka_usuario');
        window.location.href = 'login.html';
    }
});

cargarUsuario();
cargarCursos();
</script>

</body>
</html>
