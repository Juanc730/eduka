<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Usuarios — Instituto Eduka</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

<nav class="navbar">
    <div class="navbar-brand">Instituto Eduka</div>
    <div class="navbar-links">
        <span id="nombre-usuario"></span>
        <a href="dashboard.html">Inicio</a>
        <a href="#" id="btn-logout">Cerrar sesión</a>
    </div>
</nav>

<div class="dashboard-container">
    <div class="page-header">
        <h1>Gestión de Usuarios</h1>
        <button class="btn-primary" id="btn-nuevo">+ Nuevo Usuario</button>
    </div>

    <p class="success" id="mensaje-success" style="display:none;"></p>
    <p class="error" id="mensaje-error" style="display:none;"></p>

    <form id="form-buscar" class="buscador-container">
        <input type="text" id="buscar" placeholder="🔍 Buscar por nombre, correo o rol..." class="buscador-input">
        <button type="submit" class="btn-primary">Buscar</button>
        <button type="button" id="btn-limpiar" class="btn-secondary" style="display:none;">Limpiar</button>
    </form>

    <p class="buscador-contador" id="contador-resultados" style="display:none; margin-bottom:1rem;"></p>

    <div class="table-container">
        <table class="tabla">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Nombre</th>
                    <th>Correo</th>
                    <th>Rol</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="tabla-usuarios">
                <tr><td colspan="6" style="text-align:center; color:#666;">Cargando...</td></tr>
            </tbody>
        </table>
    </div>

    <div class="paginacion" id="paginacion"></div>
    <p class="pag-info" id="pag-info"></p>
</div>

<!-- Modal de Crear/Editar Usuario -->
<div id="modal-usuario" class="modal-overlay" style="display:none;">
    <div class="modal-card">
        <h2 id="modal-titulo">Nuevo Usuario</h2>
        <p class="error" id="modal-error" style="display:none;"></p>

        <form id="form-usuario">
            <input type="hidden" id="usuario-id">

            <label>Nombre *</label>
            <input type="text" id="usuario-nombre" required>

            <label>Apellido *</label>
            <input type="text" id="usuario-apellido" required>

            <label>Correo electrónico *</label>
            <input type="email" id="usuario-email" required>

            <label id="label-password">Contraseña *</label>
            <div class="input-password">
                <input type="password" id="usuario-password">
                <button type="button" class="toggle-pass" onclick="togglePassword('usuario-password', 'icon-pass')">
                    <span id="icon-pass">👁️</span>
                </button>
            </div>

            <ul class="requisitos" id="requisitos-modal" style="display:none;">
                <li id="req-len">Mínimo 8 caracteres</li>
                <li id="req-may">Al menos una mayúscula</li>
                <li id="req-min">Al menos una minúscula</li>
                <li id="req-num">Al menos un número</li>
                <li id="req-esp">Al menos un carácter especial (@, #, $, %...)</li>
            </ul>

            <label id="label-confirm">Confirmar contraseña *</label>
            <div class="input-password">
                <input type="password" id="usuario-confirm">
                <button type="button" class="toggle-pass" onclick="togglePassword('usuario-confirm', 'icon-confirm')">
                    <span id="icon-confirm">👁️</span>
                </button>
            </div>
            <p id="msg-confirm" style="font-size:0.85rem; margin-top:0.3rem;"></p>

            <label>Rol *</label>
            <select id="usuario-rol" required>
                <option value="1">Administrador</option>
                <option value="2">Estudiante</option>
                <option value="3">Docente</option>
            </select>

            <div style="display:flex; gap:0.8rem; margin-top:1.2rem;">
                <button type="submit" class="btn-primary" style="flex:1;">Guardar</button>
                <button type="button" class="btn-secondary" id="btn-cancelar" style="flex:1;">Cancelar</button>
            </div>
        </form>
    </div>
</div>

<script src="../assets/js/api.js"></script>
<script>
if (!estaAutenticado()) {
    window.location.href = 'login.html';
}

let paginaActual = 1;
let buscarActual = '';

async function cargarUsuario() {
    const { data } = await apiGet('/auth/me.php');
    if (!data.success || data.data.rol !== 'administrador') {
        window.location.href = 'dashboard.html';
        return;
    }
    document.getElementById('nombre-usuario').textContent = `Hola, ${data.data.nombre}`;
}

async function cargarUsuarios() {
    const tabla = document.getElementById('tabla-usuarios');
    tabla.innerHTML = '<tr><td colspan="6" style="text-align:center; color:#666;">Cargando...</td></tr>';

    const params = new URLSearchParams({ pagina: paginaActual });
    if (buscarActual) params.set('buscar', buscarActual);

    const { data } = await apiGet(`/usuarios/listar.php?${params.toString()}`);

    if (!data.success) {
        tabla.innerHTML = '<tr><td colspan="6" style="text-align:center; color:#e74c3c;">Error al cargar usuarios.</td></tr>';
        return;
    }

    const { usuarios, total, pagina, total_pags } = data.data;

    const contador = document.getElementById('contador-resultados');
    if (buscarActual) {
        contador.style.display = 'block';
        contador.innerHTML = `${total} resultado(s) para "<strong>${buscarActual}</strong>"`;
    } else {
        contador.style.display = 'none';
    }

    if (usuarios.length === 0) {
        tabla.innerHTML = '<tr><td colspan="6" style="text-align:center; color:#666;">No se encontraron resultados.</td></tr>';
    } else {
        tabla.innerHTML = usuarios.map(u => `
            <tr>
                <td>${u.id}</td>
                <td>${escapeHtml(u.nombre)} ${escapeHtml(u.apellido)}</td>
                <td>${escapeHtml(u.email)}</td>
                <td><span class="rol-badge rol-${u.rol}">${capitalize(u.rol)}</span></td>
                <td>${u.activo == 1
                    ? '<span class="badge-activo">Activo</span>'
                    : '<span class="badge-inactivo">Inactivo</span>'}</td>
                <td>
                    <div class="btn-group">
                        <button class="btn-secondary btn-editar" data-id="${u.id}">Editar</button>
                        <button class="${u.activo == 1 ? 'btn-danger' : 'btn-primary'} btn-toggle" data-id="${u.id}">
                            ${u.activo == 1 ? 'Desactivar' : 'Activar'}
                        </button>
                    </div>
                </td>
            </tr>
        `).join('');
    }

    renderizarPaginacion(pagina, total_pags);
    document.getElementById('pag-info').textContent = total_pags > 0
        ? `Mostrando ${usuarios.length} de ${total} usuarios — Página ${pagina} de ${total_pags}`
        : '';

    document.querySelectorAll('.btn-editar').forEach(btn => {
        btn.addEventListener('click', () => abrirModalEditar(btn.dataset.id, usuarios));
    });
    document.querySelectorAll('.btn-toggle').forEach(btn => {
        btn.addEventListener('click', () => toggleUsuario(btn.dataset.id));
    });
}

function renderizarPaginacion(pagina, totalPags) {
    const cont = document.getElementById('paginacion');
    if (totalPags <= 1) { cont.innerHTML = ''; return; }

    let html = '';
    if (pagina > 1) html += `<button class="pag-btn" data-pag="${pagina - 1}">← Anterior</button>`;
    for (let i = 1; i <= totalPags; i++) {
        html += `<button class="pag-btn ${i === pagina ? 'pag-activa' : ''}" data-pag="${i}">${i}</button>`;
    }
    if (pagina < totalPags) html += `<button class="pag-btn" data-pag="${pagina + 1}">Siguiente →</button>`;

    cont.innerHTML = html;
    cont.querySelectorAll('.pag-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            paginaActual = parseInt(btn.dataset.pag);
            cargarUsuarios();
        });
    });
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function capitalize(text) {
    return text.charAt(0).toUpperCase() + text.slice(1);
}

// Buscador
document.getElementById('form-buscar').addEventListener('submit', function (e) {
    e.preventDefault();
    buscarActual = document.getElementById('buscar').value.trim();
    paginaActual = 1;
    document.getElementById('btn-limpiar').style.display = buscarActual ? 'inline-block' : 'none';
    cargarUsuarios();
});

document.getElementById('btn-limpiar').addEventListener('click', function () {
    document.getElementById('buscar').value = '';
    buscarActual = '';
    paginaActual = 1;
    this.style.display = 'none';
    cargarUsuarios();
});

// Modal
const modal = document.getElementById('modal-usuario');
const formUsuario = document.getElementById('form-usuario');
const requisitosModal = document.getElementById('requisitos-modal');
const passInput = document.getElementById('usuario-password');
const confirmInput = document.getElementById('usuario-confirm');
const msgConfirm = document.getElementById('msg-confirm');

const requisitos = {
    'req-len': /.{8,}/,
    'req-may': /[A-Z]/,
    'req-min': /[a-z]/,
    'req-num': /[0-9]/,
    'req-esp': /[\@\#\$\%\^\&\*\!\?\.\,\-\_]/
};

function togglePassword(inputId, iconId) {
    const input = document.getElementById(inputId);
    const icon  = document.getElementById(iconId);
    if (input.type === 'password') {
        input.type = 'text';
        icon.textContent = '🙈';
    } else {
        input.type = 'password';
        icon.textContent = '👁️';
    }
}

passInput.addEventListener('input', function () {
    const val = this.value;
    requisitosModal.style.display = val.length > 0 ? 'block' : 'none';
    for (const [id, regex] of Object.entries(requisitos)) {
        const el = document.getElementById(id);
        if (regex.test(val)) {
            el.classList.add('req-ok'); el.classList.remove('req-fail');
        } else {
            el.classList.add('req-fail'); el.classList.remove('req-ok');
        }
    }
    validarConfirm();
});

confirmInput.addEventListener('input', validarConfirm);

function validarConfirm() {
    if (confirmInput.value === '') { msgConfirm.textContent = ''; return; }
    if (passInput.value === confirmInput.value) {
        msgConfirm.textContent = '✅ Las contraseñas coinciden';
        msgConfirm.style.color = '#27ae60';
    } else {
        msgConfirm.textContent = '❌ Las contraseñas no coinciden';
        msgConfirm.style.color = '#e74c3c';
    }
}

document.getElementById('btn-nuevo').addEventListener('click', abrirModalCrear);
document.getElementById('btn-cancelar').addEventListener('click', cerrarModal);

function abrirModalCrear() {
    document.getElementById('modal-titulo').textContent = 'Nuevo Usuario';
    document.getElementById('usuario-id').value = '';
    formUsuario.reset();
    document.getElementById('label-password').textContent = 'Contraseña *';
    document.getElementById('label-confirm').textContent = 'Confirmar contraseña *';
    passInput.required = true;
    confirmInput.required = true;
    requisitosModal.style.display = 'none';
    document.getElementById('modal-error').style.display = 'none';
    modal.style.display = 'flex';
}

function abrirModalEditar(id, usuarios) {
    const u = usuarios.find(x => x.id == id);
    if (!u) return;

    document.getElementById('modal-titulo').textContent = 'Editar Usuario';
    document.getElementById('usuario-id').value = u.id;
    document.getElementById('usuario-nombre').value = u.nombre;
    document.getElementById('usuario-apellido').value = u.apellido;
    document.getElementById('usuario-email').value = u.email;
    document.getElementById('usuario-rol').value = u.rol_id;
    passInput.value = '';
    confirmInput.value = '';
    document.getElementById('label-password').innerHTML = 'Nueva contraseña <small>(dejar vacío para no cambiarla)</small>';
    document.getElementById('label-confirm').innerHTML = 'Confirmar nueva contraseña <small>(solo si la cambias)</small>';
    passInput.required = false;
    confirmInput.required = false;
    requisitosModal.style.display = 'none';
    msgConfirm.textContent = '';
    document.getElementById('modal-error').style.display = 'none';
    modal.style.display = 'flex';
}

function cerrarModal() {
    modal.style.display = 'none';
}

formUsuario.addEventListener('submit', async function (e) {
    e.preventDefault();

    const id = document.getElementById('usuario-id').value;
    const modalError = document.getElementById('modal-error');
    modalError.style.display = 'none';

    const payload = {
        nombre: document.getElementById('usuario-nombre').value.trim(),
        apellido: document.getElementById('usuario-apellido').value.trim(),
        email: document.getElementById('usuario-email').value.trim(),
        rol_id: parseInt(document.getElementById('usuario-rol').value),
        password: passInput.value,
        confirm_password: confirmInput.value
    };

    let resultado;
    if (id) {
        payload.id = parseInt(id);
        resultado = await apiPut('/usuarios/editar.php', payload);
    } else {
        resultado = await apiPost('/usuarios/crear.php', payload);
    }

    if (resultado.data.success) {
        cerrarModal();
        mostrarMensaje('success', resultado.data.message);
        cargarUsuarios();
    } else {
        modalError.textContent = resultado.data.error;
        modalError.style.display = 'block';
    }
});

async function toggleUsuario(id) {
    if (!confirm('¿Confirmas esta acción?')) return;

    const { data } = await apiPut('/usuarios/toggle.php', { id: parseInt(id) });

    if (data.success) {
        mostrarMensaje('success', data.message);
        cargarUsuarios();
    } else {
        mostrarMensaje('error', data.error);
    }
}

function mostrarMensaje(tipo, texto) {
    const el = document.getElementById(`mensaje-${tipo}`);
    el.textContent = texto;
    el.style.display = 'block';
    setTimeout(() => { el.style.display = 'none'; }, 4000);
}

document.getElementById('btn-logout').addEventListener('click', function (e) {
    e.preventDefault();
    if (confirm('¿Estás seguro que deseas cerrar sesión?')) {
        eliminarToken();
        localStorage.removeItem('eduka_usuario');
        window.location.href = 'login.html';
    }
});

cargarUsuario();
cargarUsuarios();
</script>

</body>
</html>
