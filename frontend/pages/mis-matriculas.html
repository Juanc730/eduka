<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Matrículas — Instituto Eduka</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

<nav class="navbar">
    <div class="navbar-brand">Instituto Eduka</div>
    <div class="navbar-links">
        <span id="nombre-usuario"></span>
        <a href="dashboard.html">Inicio</a>
        <a href="#" id="btn-logout">Cerrar sesión</a>
    </div>
</nav>

<div class="dashboard-container">
    <div class="page-header">
        <h1>Mis Matrículas</h1>
        <a href="cursos.html" class="btn-primary">+ Nueva Matrícula</a>
    </div>

    <div class="table-container">
        <table class="tabla">
            <thead>
                <tr>
                    <th>Curso</th>
                    <th>Horario</th>
                    <th>Docente</th>
                    <th>Estado Matrícula</th>
                    <th>Estado Pago</th>
                    <th>Acción</th>
                </tr>
            </thead>
            <tbody id="tabla-matriculas">
                <tr><td colspan="5" style="text-align:center; color:#666;">Cargando...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script src="../assets/js/api.js"></script>
<script>
if (!estaAutenticado()) {
    window.location.href = 'login.html';
}

async function cargarUsuario() {
    const { data } = await apiGet('/auth/me.php');
    if (!data.success || data.data.rol !== 'estudiante') {
        window.location.href = 'dashboard.html';
        return;
    }
    document.getElementById('nombre-usuario').textContent = `Hola, ${data.data.nombre}`;
}

async function cargarMatriculas() {
    const tabla = document.getElementById('tabla-matriculas');
    const { data } = await apiGet('/matriculas/mis_matriculas.php');

    if (!data.success) {
        tabla.innerHTML = `<tr><td colspan="5" style="text-align:center; color:#e74c3c;">Error al cargar tus matrículas.</td></tr>`;
        return;
    }

    const matriculas = data.data.matriculas;

    if (matriculas.length === 0) {
        tabla.innerHTML = `<tr><td colspan="5" style="text-align:center; color:#666;">Aún no tienes matrículas registradas.</td></tr>`;
        return;
    }

    tabla.innerHTML = matriculas.map(m => {
        const docente = m.docente_nombre ? `${m.docente_nombre} ${m.docente_apellido}` : 'Sin asignar';
        let accion = '<span style="color:#aaa;">—</span>';

        if (!m.pago_id) {
            accion = `<a href="pagar.html?matricula_id=${m.id}" class="btn-primary">Registrar pago</a>`;
        } else if (m.pago_estado === 'rechazado') {
            accion = `<a href="pagar.html?matricula_id=${m.id}" class="btn-primary">Reintentar</a>`;
        }

        return `
            <tr>
                <td>${escapeHtml(m.curso)}</td>
                <td>${escapeHtml(m.horario)}</td>
                <td>${escapeHtml(docente)}</td>
                <td><span class="estado-badge estado-${m.estado}">${capitalize(m.estado)}</span></td>
                <td>${m.pago_estado
                    ? `<span class="estado-badge estado-${m.pago_estado}">${capitalize(m.pago_estado)}</span>`
                    : '<span class="estado-badge estado-pendiente">Sin pago</span>'}
                </td>
                <td>${accion}</td>
            </tr>
        `;
    }).join('');
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function capitalize(text) {
    return text.charAt(0).toUpperCase() + text.slice(1);
}

document.getElementById('btn-logout').addEventListener('click', function (e) {
    e.preventDefault();
    if (confirm('¿Estás seguro que deseas cerrar sesión?')) {
        eliminarToken();
        localStorage.removeItem('eduka_usuario');
        window.location.href = 'login.html';
    }
});

cargarUsuario();
cargarMatriculas();
</script>

</body>
</html>
