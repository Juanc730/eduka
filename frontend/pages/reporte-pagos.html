<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estado de Pagos — Instituto Eduka</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

<nav class="navbar">
    <div class="navbar-brand">Instituto Eduka</div>
    <div class="navbar-links">
        <span id="nombre-usuario"></span>
        <a href="dashboard.html">Inicio</a>
        <a href="#" id="btn-logout">Cerrar sesión</a>
    </div>
</nav>

<div class="dashboard-container">
    <div class="page-header">
        <h1>Estado de Pagos</h1>
        <a href="reportes.html" class="btn-secondary">← Volver</a>
    </div>

    <div class="reporte-resumen" id="resumen" style="margin-bottom:1.5rem;"></div>

    <div class="table-container">
        <table class="tabla">
            <thead>
                <tr>
                    <th>Estudiante</th>
                    <th>Curso</th>
                    <th>Monto</th>
                    <th>Método</th>
                    <th>Estado</th>
                    <th>Fecha</th>
                </tr>
            </thead>
            <tbody id="tabla-pagos">
                <tr><td colspan="6" style="text-align:center; color:#666;">Cargando...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script src="../assets/js/api.js"></script>
<script>
if (!estaAutenticado()) {
    window.location.href = 'login.html';
}

async function cargarUsuario() {
    const { data } = await apiGet('/auth/me.php');
    if (!data.success || data.data.rol !== 'administrador') {
        window.location.href = 'dashboard.html';
        return;
    }
    document.getElementById('nombre-usuario').textContent = `Hola, ${data.data.nombre}`;
}

async function cargarReporte() {
    const { data } = await apiGet('/reportes/pagos.php');
    const tabla = document.getElementById('tabla-pagos');

    if (!data.success) {
        tabla.innerHTML = '<tr><td colspan="6" style="text-align:center; color:#e74c3c;">Error al cargar el reporte.</td></tr>';
        return;
    }

    const { pagos, total_aprobado, total_pendiente, total_rechazado, total_registros } = data.data;

    document.getElementById('resumen').innerHTML = `
        <div class="resumen-card">
            <span class="resumen-num">S/ ${parseFloat(total_aprobado).toFixed(2)}</span>
            <span class="resumen-label">Total recaudado</span>
        </div>
        <div class="resumen-card">
            <span class="resumen-num">${total_pendiente}</span>
            <span class="resumen-label">Pagos pendientes</span>
        </div>
        <div class="resumen-card">
            <span class="resumen-num">${total_rechazado}</span>
            <span class="resumen-label">Pagos rechazados</span>
        </div>
        <div class="resumen-card">
            <span class="resumen-num">${total_registros}</span>
            <span class="resumen-label">Total registros</span>
        </div>
    `;

    if (pagos.length === 0) {
        tabla.innerHTML = '<tr><td colspan="6" style="text-align:center; color:#666;">No hay pagos registrados.</td></tr>';
        return;
    }

    tabla.innerHTML = pagos.map(p => `
        <tr>
            <td>${escapeHtml(p.estudiante)}</td>
            <td>${escapeHtml(p.curso)}</td>
            <td>S/ ${parseFloat(p.monto).toFixed(2)}</td>
            <td>${p.metodo_verificacion === 'codigo'
                ? '<span class="badge-activo">Código Yape</span>'
                : '<span class="estado-badge estado-pendiente">Comprobante</span>'}
            </td>
            <td><span class="estado-badge estado-${p.estado}">${capitalize(p.estado)}</span></td>
            <td>${new Date(p.fecha).toLocaleString('es-PE', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' })}</td>
        </tr>
    `).join('');
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function capitalize(text) {
    return text.charAt(0).toUpperCase() + text.slice(1);
}

document.getElementById('btn-logout').addEventListener('click', function (e) {
    e.preventDefault();
    if (confirm('¿Estás seguro que deseas cerrar sesión?')) {
        eliminarToken();
        localStorage.removeItem('eduka_usuario');
        window.location.href = 'login.html';
    }
});

cargarUsuario();
cargarReporte();
</script>

</body>
</html>
